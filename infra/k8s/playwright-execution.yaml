apiVersion: apps/v1
kind: Deployment
metadata:
  name: playwright-execution-engine
spec:
  replicas: 2
  selector:
    matchLabels:
      app: playwright-execution-engine
  template:
    metadata:
      labels:
        app: playwright-execution-engine
    spec:
      containers:
        - name: playwright-execution-engine
          image: ai-synthetic/playwright-execution-engine:latest
          ports:
            - containerPort: 3001
          env:
            - name: DATABASE_URL
              value: "postgresql://postgres:postgres@postgres:5432/ai_synthetic"
            - name: REDIS_URL
              value: "redis://redis:6379"
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 1
              memory: 2Gi
          volumeMounts:
            - name: artifacts
              mountPath: /artifacts
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
      volumes:
        - name: artifacts
          persistentVolumeClaim:
            claimName: artifacts-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: playwright-execution-engine
spec:
  selector:
    app: playwright-execution-engine
  ports:
    - port: 80
      targetPort: 3001
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: artifacts-pvc
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 50Gi