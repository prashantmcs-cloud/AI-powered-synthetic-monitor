version: '3.9'
services:
  webhook-receiver:
    build:
      context: .
      dockerfile: services/webhook-receiver/Dockerfile
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
  web-ui:
    build:
      context: .
      dockerfile: apps/web-ui/Dockerfile
    ports:
      - "3001:3000"
    environment:
      PORT: 3000
